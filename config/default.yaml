# default.yaml — 기본 설정 (Loop 0-D 골격). 값 일부는 benchmarks/dev 에서 유도(비워둠).

k: 5                       # peer 개수

# 채점 대상 재무비율: 분자/분모 계정 (ORACLE.md 동결 명세와 일치).
# 총자산회전율은 정보 누출(매출액 ÷ 총자산; 둘 다 엔진 허용)로 Loop 0-D에서 제거됨.
ratios:
  - name: 매출총이익률
    numerator: 매출총이익
    denominator: 매출액
  - name: 영업이익률
    numerator: 영업이익
    denominator: 매출액
  - name: 재고자산회전율
    numerator: 매출원가
    denominator: 재고자산
  - name: 매출채권회전율
    numerator: 매출액
    denominator: 매출채권

# 정보 차단벽: 엔진이 볼 수 있는 입력(열거). 이 목록에 없는 모든 계정은 금지(여집합).
# test_no_leakage.py 가 ratios 각각을 이 목록에 대해 기계적으로 검사한다.
engine_allowed_inputs:
  - 산업분류
  - 매출액
  - 총자산
  - 종업원수
  - 사업내용텍스트
  - 시가총액                # Loop 3: as_of 시총(규모 유사도 축). 채점 4비율의 분자/분모가 아님 → 누출 아님.
  - 매출성장률              # Loop 4: T 이전 매출 2개 연차의 성장률. 매출액(허용)의 시계열 변환 → 누출 아님.
  - seg_hhi                # Loop 4: 부문별 '매출 비중'의 집중도(HHI). 부문 이익률 아님 → 누출 아님.
  - seg_top_share          # Loop 4: 최대 부문 매출 비중.
  - seg_n                  # Loop 4: 매출 보고 부문 수.

# FAIL 페널티: 값이 아니라 '유도 방법'을 고정한다 (임의 상수 금지).
penalty:
  method: dev_baseline_upper_tail   # dev 의 '시장 중앙값'(대조군A) APE 분포 상위 꼬리
  quantile: 0.9                      # 상위 꼬리 분위수(config). 값은 dev에서 유도(runs에 기록).
  value:                             # (비움) dev 에서 유도된 실제 페널티 APE

# ORACLE: 유효 peer 3개 미만이면 FAIL → 페널티(제외 아님).
min_valid_peers: 3

# baseline 엔진(산업분류+규모). 매직상수 금지 — 전부 여기서.
baseline:
  scale_features: [매출액, 총자산]     # 규모 피처(엔진 허용 입력)
  scale_distance: log_euclidean       # 로그 규모 유클리드 거리
  industry_tier_prefixes: [999, 2]    # 우선순위: 완전일치(999=전체) > 2자리 > 그외(★배제 아님)
  missing_scale: rank_last            # 규모 결측 기업은 scale 거리 최대(뒤로) — 배제/대체 아님

# similarity 엔진(산업·규모·시총·텍스트 가중합). 구조 파라미터만 config; 가중치·커널폭은 dev 탐색(runs 기록).
similarity:
  scale_features: [매출액, 총자산]
  industry_prefixes: [999, 2]         # 산업 유사도 tier 접두(완전/2자리)
  text_ngram: 3                       # 문자 n-gram(한국어 형태 근사)
  text_vocab_size: 3000               # 상위 df 어휘 크기
  text_section_title: "사업의 내용"    # 섹션 추출 구조 앵커(규제 서식의 표준 섹션명; 회사명·코드 아님)
  # 구성 요소(순서=가중치 순서). 각 요소는 유사도 성분, dev 격자로 가중.
  # ★ Loop 5: 부문(segment) 데이터 확보(성공률 85.7%, SEGMENT_EXTRACTION.md) → 활성화. 6축.
  #   활성 축 = 산업·규모·시총·텍스트·성장·부문. 결측 기업은 sim_segment=0(임의대체 0).
  components: [industry, scale, mktcap, text, growth, segment]
  mktcap_feature: 시가총액             # 시총 규모 유사도(로그 거리) — as_of 시점 KRX
  growth_feature: 매출성장률           # Loop 4: 매출성장률 유사도(데이터유도 스케일 거리) — T 이전 매출만
  segment_features: [seg_hhi, seg_top_share, seg_n]  # Loop 4: 부문 집중도 프로필(준비완료; 데이터 대기)
  weight_grid: [0.0, 0.25, 0.5, 0.75, 1.0]  # dev 가중치 탐색 격자(합=1 정규화)

# 오차 이내 비율 보고 기준(%) — 임계값을 고정하지 않고 셋 다 보고.
within: [10, 20, 30]

# 게이트 재집계 대조: 이 소수자리로 반올림 후 정확 비교 (gate.py tol 매직상수 대체, 0-I 검증 #3).
reconcile_decimals: 2

# PIT 데이터 dev/holdout 분리 (Loop 0-F C-4). holdout 은 봉인 — 상수 유도·튜닝 참조 금지.
# 평가시점(매년 5/15) 연도 기준.
pit_split:
  dev_years: [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022]
  holdout_years: [2023, 2024, 2025]
