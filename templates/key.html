{% extends "base.html" %}
{% block title %}OpenDART 키 · PeerLens{% endblock %}
{% block content %}
  <main class="wrap">
    <section class="panel">
      <h2>OpenDART API 키</h2>

      <form class="form-card" method="post" action="{{ url_for('search') }}" autocomplete="off">
        <div class="field">
          <input type="password" id="opendart_api_key" name="opendart_api_key" required
                 autocomplete="off" autofocus aria-label="OpenDART API 키 (40자리, 필수)"
                 class="{% if key_error %}invalid{% endif %}"
                 placeholder="40자리 인증키">
          {% if key_error %}<p class="field-msg">OpenDART API 키를 입력하세요.</p>{% endif %}
        </div>
        <button type="submit" class="cta block">
          다음
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
        </button>
      </form>
      <div class="backrow"><a class="back" href="{{ url_for('index') }}">← 처음으로</a></div>
    </section>
  </main>
{% endblock %}
